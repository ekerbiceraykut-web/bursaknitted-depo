services:
  - type: web
    name: bursaknitted-depo
    runtime: python
    buildCommand: pip install -r cloud/requirements.txt
    startCommand: python cloud/server.py
    plan: starter          # $7/ay — her zaman açık
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bursaknitted-db
          property: connectionString
      - key: PORT
        value: "10000"

databases:
  - name: bursaknitted-db
    plan: free             # 90 gün ücretsiz
